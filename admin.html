<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel | Kanto Klasik</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background:#111;
    color:#fff;
}

.card {
    background:#1c1c1c;
    border-radius:15px;
    margin-bottom:15px;
}

.btn-main {
    background:#ff6b00;
    color:#fff;
}

.badge-pending {
    background:orange;
}

.badge-done {
    background:green;
}
</style>
</head>

<body>

<div class="container py-5">

<h2 class="text-center mb-4">🧑‍💼 Admin Panel</h2>

<div id="orders"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ordersRef = ref(db, "orders");

// LIVE LISTENER
onValue(ordersRef, (snapshot)=>{
let data = snapshot.val();
let container = document.getElementById("orders");

container.innerHTML = "";

if(!data){
container.innerHTML = "<p>No orders yet</p>";
return;
}

Object.entries(data).forEach(([id,order])=>{

let items = "";
order.cart.forEach(i=>{
items += `<li>${i.name} x${i.qty}</li>`;
});

container.innerHTML += `
<div class="card p-3 mb-3">
<h5>${order.name}</h5>
<p>📞 ${order.phone}</p>
<p>📍 ${order.address}</p>

<ul>${items}</ul>

<p><strong>Total:</strong> ₱${order.total}</p>
<p><small>${order.date}</small></p>

<span class="badge ${order.status === 'done' ? 'bg-success' : 'bg-warning'}">
${order.status}
</span>

<div class="mt-3">
<button class="btn btn-success btn-sm" onclick="markDone('${id}')">✔ Done</button>
<button class="btn btn-danger btn-sm" onclick="deleteOrder('${id}')">🗑 Delete</button>
</div>

</div>
`;
});
});

// ACTIONS
window.markDone = function(id){
update(ref(db, "orders/" + id), { status: "done" });
}

window.deleteOrder = function(id){
if(confirm("Delete order?")){
remove(ref(db, "orders/" + id));
}
}
</script>

</body>
</html>
