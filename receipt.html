<!DOCTYPE html>
<html>
<head>
<title>Receipt</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">
<div class="card p-4">
<h3>Kanto Klasik Receipt</h3>

<p><strong>Table:</strong> <span id="table"></span></p>
<p><strong>Time:</strong> <span id="time"></span></p>

<hr>

<div id="items"></div>

<hr>
<h4>Total: ₱<span id="total"></span></h4>

<p><strong>Payment:</strong> <span id="payment"></span></p>

<button onclick="window.print()" class="btn btn-dark mt-3">Print Receipt</button>
</div>
</div>

<script>
let order = JSON.parse(localStorage.getItem("lastOrder"));

let itemsDiv = document.getElementById("items");
let total = 0;

order.items.forEach(item => {
    total += item.price * item.qty;

    itemsDiv.innerHTML += `
    <div class="d-flex justify-content-between">
        <span>${item.name} x${item.qty}</span>
        <span>₱${item.price * item.qty}</span>
    </div>
    `;
});

document.getElementById("total").textContent = total;
document.getElementById("table").textContent = order.table;
document.getElementById("time").textContent = order.time;
document.getElementById("payment").textContent = order.payment;
</script>

</body>
</html>
