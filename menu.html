<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kanto Klasik Menu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1504674900247-0877df9cc836');
    background-size: cover;
    background-attachment: fixed;
    color: #fff;
}

.navbar { backdrop-filter: blur(10px); }

.navbar-brand {
    font-weight: bold;
    color: #ff6b00 !important;
}

.nav-link { color: #fff !important; }

.menu-card {
    transition: 0.3s;
    border-radius: 15px;
    overflow: hidden;
}

.menu-card:hover { transform: scale(1.05); }

.card {
    background: rgba(255,255,255,0.95);
    color: #000;
}

.price {
    color: #ff6b00;
    font-weight: bold;
}

.btn-order {
    background: #ff6b00;
    color: #fff;
}

.btn-order:hover { background: #e65c00; }

.toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm">
<div class="container">
<a class="navbar-brand" href="home.html">Kanto Klasik</a>

<button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#nav"></button>

<div class="collapse navbar-collapse justify-content-between" id="nav">
<ul class="navbar-nav mx-auto">
<li class="nav-item"><a class="nav-link" href="kantoklasik.html">Home</a></li>
<li class="nav-item"><a class="nav-link active" href="#">Menu</a></li>
<li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
<li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
</ul>

<a href="cart.html" class="btn position-relative text-white">
<i class="bi bi-cart fs-4"></i>
<span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
</a>
</div>
</div>
</nav>

<!-- MENU -->
<div class="container py-5">
<h2 class="text-center mb-4">🍽 Our Menu</h2>

<div class="row g-4">

<!-- ITEMS -->
<script>
const menu = [
{name:"Chaoegg", price:49, img:"2.png"},
{name:"Chaohai", price:69, img:"3.png"},
{name:"Chaofin", price:69, img:"4.png"},
{name:"Chaomai", price:69, img:"5.png"},
{name:"Chaofil", price:89, img:"6.png"},
{name:"Chaoliem", price:99, img:"7.png"}
];

document.write(menu.map(item => `
<div class="col-md-4">
<div class="card menu-card shadow">
<img src="${item.img}" class="card-img-top">
<div class="card-body text-center">
<h5>${item.name}</h5>
<p class="price">₱${item.price}</p>
<button class="btn btn-order w-100" onclick="addToCart('${item.name}',${item.price})">Add to Cart</button>
</div>
</div>
</div>
`).join(""));
</script>

</div>
</div>

<!-- TOAST -->
<div class="toast-container">
<div id="toast" class="toast text-bg-success border-0">
<div class="d-flex">
<div class="toast-body">Added to cart!</div>
<button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// CART
function addToCart(name, price){
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let item = cart.find(i => i.name === name);
if(item){ item.qty++; }
else{ cart.push({name,price,qty:1}); }

localStorage.setItem("cart", JSON.stringify(cart));
updateCart();

new bootstrap.Toast(document.getElementById('toast')).show();
}

function updateCart(){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = cart.reduce((sum,i)=>sum+i.qty,0);
document.getElementById("cart-count").textContent = total;
}

updateCart();
</script>

</body>
</html>
