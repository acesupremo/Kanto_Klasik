<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Checkout | Kanto Klasik</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background:#111;
    color:#fff;
}

.container-box {
    background:#1c1c1c;
    padding:25px;
    border-radius:15px;
}

.price {
    color:#ff6b00;
    font-weight:bold;
}

.btn-main {
    background:#ff6b00;
    color:#fff;
    border-radius:30px;
}

input, textarea {
    background:#222 !important;
    border:none !important;
    color:#fff !important;
}

</style>
</head>

<body>

<div class="container py-5">

<h2 class="text-center mb-4">🧾 Checkout</h2>

<div class="row g-4">

<!-- CART -->
<div class="col-md-6">
<div class="container-box">

<h4>Your Order</h4>
<div id="cartItems"></div>

<hr>

<h5>Total: <span class="price" id="total"></span></h5>

</div>
</div>

<!-- FORM -->
<div class="col-md-6">
<div class="container-box">

<h4>Customer Details</h4>

<form id="orderForm">
<input type="text" class="form-control mb-3" placeholder="Full Name" required>
<input type="text" class="form-control mb-3" placeholder="Phone Number" required>
<textarea class="form-control mb-3" placeholder="Address" required></textarea>

<button class="btn btn-main w-100">Place Order</button>
</form>

</div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// LOAD CART
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let total = 0;

function renderCart(){
let html = "";

cart.forEach(item=>{
html += `
<div class="d-flex justify-content-between">
<span>${item.name} x${item.qty}</span>
<span>₱${item.price * item.qty}</span>
</div>`;
total += item.price * item.qty;
});

document.getElementById("cartItems").innerHTML = html || "Cart is empty";
document.getElementById("total").innerText = "₱" + total;
}

renderCart();

// SUBMIT ORDER
document.getElementById("orderForm").addEventListener("submit", function(e){
e.preventDefault();

let inputs = this.querySelectorAll("input, textarea");

let order = {
name: inputs[0].value,
phone: inputs[1].value,
address: inputs[2].value,
cart: cart,
total: total,
status: "pending",
date: new Date().toLocaleString()
};

// SEND TO FIREBASE
push(ref(db, "orders"), order);

// CLEAR CART
localStorage.removeItem("cart");

alert("Order placed successfully!");
window.location.href = "home.html";
});
</script>

</body>
</html>
