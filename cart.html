<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Cart</title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
    body {
        background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url('https://images.unsplash.com/photo-1504674900247-0877df9cc836');
        background-size: cover;
        background-attachment: fixed;
        color: #fff;
    }

.navbar {
    backdrop-filter: blur(10px);
}

.navbar-brand {
    font-weight: bold;
    color: #ff6b00 !important;
}

.nav-link {
    color: #fff !important;
}

.cart-box {
    background: rgba(255,255,255,0.95);
    color: #000;
    padding: 15px;
    border-radius: 10px;
}

.price {
    color: #ff6b00;
    font-weight: bold;
}

.qty-btn {
    width: 35px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="menu.html">Kanto Klasik</a>

        <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-between" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link" href="kantoklasik.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>

            <!-- CART ICON -->
            <a href="cart.html" class="btn position-relative text-white">
                <i class="bi bi-cart fs-4"></i>
                <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge bg-danger">
                    0
                </span>
            </a>
        </div>
    </div>
</nav>

<!-- CONTENT -->
<div class="container py-5">
    <div class="row g-4">

<!-- CART ITEMS -->
<div class="col-lg-8">
    <h3 class="mb-3">🛒 Your Cart</h3>
    <div id="cart-items"></div>
</div>

<!-- PAYMENT -->
<div class="col-lg-4">
    <div class="cart-box shadow">
    <h5>Payment Method</h5>

    <div class="form-check">
        <input class="form-check-input" type="radio" name="pay" checked>
        <label class="form-check-label">GCash</label>
    </div>

    <div class="form-check">
        <input class="form-check-input" type="radio" name="pay">
        <label class="form-check-label">PayMaya</label>
    </div>

    <div class="form-check mb-3">
        <input class="form-check-input" type="radio" name="pay">
        <label class="form-check-label">Cash</label>
    </div>
<hr>

<h5>Total: <span id="total">₱0</span></h5>

<button onclick="checkout()" class="btn btn-success w-100 mt-3">Checkout</button>
</div>
</div>

</div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
const container = document.getElementById("cart-items");
const totalEl = document.getElementById("total");
const cartCount = document.getElementById("cart-count");

function render(){
container.innerHTML="";
let total=0;
let totalQty=0;

cart.forEach((item,i)=>{
total += item.price * item.qty;
totalQty += item.qty;

container.innerHTML += `
<div class="cart-box d-flex justify-content-between align-items-center mb-3 shadow">
<div>
<h5>${item.name}</h5>
<p class="price">₱${item.price}</p>
</div>

<div class="d-flex align-items-center">
<button onclick="change(${i},-1)" class="btn btn-outline-secondary qty-btn">-</button>
<span class="mx-3">${item.qty}</span>
<button onclick="change(${i},1)" class="btn btn-outline-secondary qty-btn">+</button>
</div>
</div>
`;
});

totalEl.textContent="₱"+total;
cartCount.textContent = totalQty;

localStorage.setItem("cart", JSON.stringify(cart));
}

function change(i,val){
cart[i].qty += val;

if(cart[i].qty <= 0){
    cart.splice(i,1);
}

render();
}

function checkout(){

let table = localStorage.getItem("table") || "Walk-in";
let payment = document.querySelector('input[name="pay"]:checked').nextElementSibling.textContent;

if(cart.length === 0){
    alert("Cart is empty!");
    return;
}

let order = {
    id: Date.now(),
    table,
    items: cart,
    payment,
    status: "Pending",
    time: new Date().toLocaleTimeString()
};

let orders = JSON.parse(localStorage.getItem("orders")) || [];
orders.push(order);

localStorage.setItem("orders", JSON.stringify(orders));
localStorage.setItem("lastOrder", JSON.stringify(order));

localStorage.removeItem("cart");

window.location.href = "receipt.html";
}

render();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
